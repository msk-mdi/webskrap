[project]
site_name = "WebSkrap"
site_description = "Async-first Python scraping framework built on Playwright."
site_url = "https://kacigaya.github.io/webskrap/"
repo_url = "https://github.com/kacigaya/webskrap"
repo_name = "kacigaya/webskrap"
edit_uri = "edit/main/docs/"

extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/copy.js"]

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Quickstart" = "getting-started/quickstart.md" },
  ] },
  { "User Guide" = [
    { "Client" = "user-guide/client.md" },
    { "Sessions" = "user-guide/sessions.md" },
    { "Profiles" = "user-guide/profiles.md" },
    { "Stealth" = "user-guide/stealth.md" },
    { "Resource Policy" = "user-guide/resource-policy.md" },
    { "CLI" = "user-guide/cli.md" },
    { "MCP server" = "user-guide/mcp.md" },
  ] },
  { "API Reference" = "api-reference.md" },
  { "Development" = "development.md" },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
variant = "modern"
language = "en"
logo = "assets/webskrap-logo.png"
favicon = "assets/webskrap-logo.png"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "lucide/square-pen"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

# System preference (auto) → light → dark
[[project.theme.palette]]
media = "(prefers-color-scheme)"
primary = "cyan"
accent = "blue"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "cyan"
accent = "blue"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "cyan"
accent = "blue"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

# ----------------------------------------------------------------------------
# Extra
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/kacigaya/webskrap"
name = "WebSkrap on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/webskrap/"
name = "WebSkrap on PyPI"

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
[project.plugins.search]
[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
show_source = true
show_root_heading = true
show_signature_annotations = true
separate_signature = true

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
